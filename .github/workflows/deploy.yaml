name: Deploy Frontend Service

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 --provenance=false \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_USE_MOCK="false" \
            --build-arg NEXT_PUBLIC_KAKAO_REST_API_KEY="${{ secrets.NEXT_PUBLIC_KAKAO_REST_API_KEY }}" \
            --build-arg NEXT_PUBLIC_KAKAO_REDIRECT_URI="${{ secrets.NEXT_PUBLIC_KAKAO_REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_REDIRECT_URI="${{ secrets.NEXT_PUBLIC_GOOGLE_REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_TOSS_CLIENT_KEY="${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}" \
            -t $ECR_REGISTRY/mindlog-fe:latest .
          docker push $ECR_REGISTRY/mindlog-fe:latest
      #cd 트리거 추가  
      - name: Trigger Deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CICD_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/8ocket/CICD/dispatches \
            -d '{"event_type":"deploy"}'
